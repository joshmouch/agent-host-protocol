name: $(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: microsoft/vscode-engineering
      ref: main
      endpoint: Monaco

parameters:
  - name: publishPackage
    displayName: 🚀 Publish @microsoft/agent-host-protocol
    type: boolean
    default: false

extends:
  template: azure-pipelines/npm-package/pipeline.yml@templates
  parameters:
    npmPackages:
      - name: agent-host-protocol
        workingDirectory: clients/typescript
        ghCreateTag: false
        publishPackage: ${{ parameters.publishPackage }}

        # Runs on the Package job — produces the artifact that gets published.
        # Generated wire types and the compiled `dist/` are both required by
        # the package's `files` field, so they must exist before `npm pack`.
        buildSteps:
          - script: npm ci
            displayName: 📦 Install root dependencies

          # Defense-in-depth checks before producing the publish artifact.
          # These also run on every commit via the GitHub Actions `ci.yml`
          # workflow, but re-running them here means the npm package can't
          # ship from a branch state that would have failed the GHA check.
          # See CONTRIBUTING.md for the release model.
          - script: npm run verify:release-metadata
            displayName: ✅ Verify release metadata

          - script: npm run verify:changelog
            displayName: ✅ Verify CHANGELOG entry exists

          - script: npm run generate:typescript
            displayName: 🛠 Generate TypeScript wire types

          - script: npm ci
            workingDirectory: clients/typescript
            displayName: 📦 Install client dependencies

          - script: npm run build
            workingDirectory: clients/typescript
            displayName: 🛠 Build client

        testPlatforms:
          - name: Linux
            nodeVersions:
              - 22.x

        # Runs on each test platform job.
        testSteps:
          - script: npm ci
            displayName: 📦 Install root dependencies

          - script: npm run verify:release-metadata
            displayName: ✅ Verify release metadata

          - script: npm run verify:changelog
            displayName: ✅ Verify CHANGELOG entry exists

          - script: npm run generate:typescript
            displayName: 🛠 Generate TypeScript wire types

          - script: npm ci
            workingDirectory: clients/typescript
            displayName: 📦 Install client dependencies

          - script: npm run typecheck
            workingDirectory: clients/typescript
            displayName: ✅ Typecheck client

          - script: npm test
            workingDirectory: clients/typescript
            displayName: 🧪 Test client
