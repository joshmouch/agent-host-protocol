name: Publish Kotlin Package

on:
  push:
    tags:
      - "kotlin/v*"

permissions:
  contents: read

concurrency:
  group: publish-kotlin-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: clients/kotlin

jobs:
  # Run the full validation pipeline before any artifacts are published.
  # Equivalent to the rust workflow's `validate` job but additionally
  # re-runs the Kotlin generator to catch the case where someone tagged a
  # release without committing regenerated sources.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: gradle/actions/wrapper-validation@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Install Node deps
        working-directory: .
        run: npm ci

      - name: Verify generated Kotlin is up to date
        working-directory: .
        run: |
          npm run generate:kotlin
          if [ -n "$(git status --porcelain -- clients/kotlin)" ]; then
            echo "::error::Generated Kotlin sources are out of date. Run 'npm run generate:kotlin' and commit the result."
            git status --porcelain -- clients/kotlin
            git --no-pager diff -- clients/kotlin
            exit 1
          fi

      - name: Verify release metadata is consistent
        working-directory: .
        run: npm run verify:release-metadata

      # CHANGELOG must have a matching `## [X.Y.Z]` heading. Catches the
      # common mistake of bumping VERSION_NAME and tagging without
      # rotating the Unreleased section in the changelog.
      - name: Verify CHANGELOG entry exists
        working-directory: .
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#kotlin/v}"
          if ! grep -qE "^## \[$TAG_VERSION\]" clients/kotlin/CHANGELOG.md; then
            echo "::error::clients/kotlin/CHANGELOG.md is missing a '## [$TAG_VERSION]' entry. Move the Unreleased section under that heading before tagging."
            exit 1
          fi

      - name: Run all checks
        run: ./gradlew check --stacktrace

  publish:
    needs: validate
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v6

      - uses: gradle/actions/wrapper-validation@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      # Source-of-truth version lives in `gradle.properties` (`VERSION_NAME`,
      # mirrored to `project.version` in `build.gradle.kts`). Any mismatch
      # between the git tag and the Gradle version means the artifact would
      # publish under a coordinate that doesn't match the tag — fail loud.
      #
      # We also reject `*-SNAPSHOT` tags here: snapshot publishing goes to
      # a different Sonatype URL and shouldn't be triggered by tagging. If
      # snapshot publishing is needed, add a separate workflow for it.
      - name: Verify tag matches Gradle version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#kotlin/v}"
          GRADLE_VERSION=$(./gradlew properties -q --no-configuration-cache | awk '/^version: /{print $2}')

          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Gradle version ($GRADLE_VERSION)"
            exit 1
          fi

          case "$GRADLE_VERSION" in
            *-SNAPSHOT)
              echo "::error::Refusing to release a SNAPSHOT version ($GRADLE_VERSION) via the kotlin/v* tag pipeline. Bump VERSION_NAME in gradle.properties to a non-SNAPSHOT value before tagging."
              exit 1
              ;;
          esac

          echo "Publishing version $GRADLE_VERSION"

      # `publishAndReleaseToMavenCentral` (Vanniktech 0.36+) uploads, validates,
      # closes, and promotes the staging deployment in a single step — no
      # manual interaction with the Sonatype Central Portal UI required.
      #
      # Required environment variables (mapped from repository secrets):
      #   - ORG_GRADLE_PROJECT_mavenCentralUsername / Password — Sonatype Central Portal user-token credentials
      #   - ORG_GRADLE_PROJECT_signingInMemoryKey               — ASCII-armored PGP private key (no passphrase prompt)
      #   - ORG_GRADLE_PROJECT_signingInMemoryKeyPassword       — passphrase for the PGP key (if any)
      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
